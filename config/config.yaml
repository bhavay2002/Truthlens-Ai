model:
  name: roberta-base
  max_length: 256
  path: models/roberta_model

training:
  seed: 42
  epochs: 3
  batch_size: 8
  learning_rate: 2.0e-5
  resume_from_checkpoint: false
  validation_size: 0.15
  test_size: 0.15
  text_column: engineered_text
  run_cross_validation: false
  cross_validation_splits: 5
  cross_validation_metric: eval_loss
  run_hyperparameter_tuning: false
  optuna_trials: 10
  optuna_direction: minimize
  optuna_metric: eval_loss
  optuna_learning_rate_min: 1.0e-6
  optuna_learning_rate_max: 5.0e-5
  optuna_batch_sizes: [8, 16]
  optuna_epoch_choices: [2, 3]
  optuna_validation_split: 0.2

features:
  tfidf_max_features: 5000
  tfidf_top_terms_per_doc: 4

data:
  raw_dir: data/raw
  interim_dir: data/interim
  augmentation_multiplier: 2
  cleaned_dataset_path: data/processed/cleaned_dataset.csv
  merged_dataset_path: data/interim/merged_dataset.csv
  test_set_path: data/processed/test_set.csv

paths:
  models_dir: /content/drive/MyDrive/truthlens_checkpoints
  logs_dir: /content/drive/MyDrive/truthlens_logs
  reports_dir: reports
  training_log_path: logs/training.log
  evaluation_results_path: reports/evaluation_results.json
  confusion_matrix_path: reports/confusion_matrix.png
  cleaning_report_path: reports/data_cleaning_report.json
  tfidf_vectorizer_path: models/tfidf_vectorizer.joblib
